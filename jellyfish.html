<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Medusa · 水母</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --ocean:#040610;
  --void:#000000;
  --arctic:#eef3f8;
  --font:'Courier New',Menlo,monospace;
}
html,body{width:100%;height:100%;background:var(--ocean);overflow:hidden;cursor:none}
canvas{display:block;position:fixed;top:0;left:0;width:100%;height:100%}

#cursor{
  position:fixed;top:0;left:0;
  width:5px;height:5px;border-radius:50%;
  background:rgba(160,220,255,0.85);
  pointer-events:none;z-index:1000;
  transform:translate(-50%,-50%);
  box-shadow:0 0 6px rgba(160,220,255,0.9),0 0 18px rgba(120,200,255,0.35);
  transition:width .1s,height .1s;
}

#label{
  position:fixed;top:28px;left:36px;
  pointer-events:none;z-index:10;
  font-family:var(--font);
}
#label .t1{font-size:9px;letter-spacing:.45em;color:rgba(140,200,255,.22);text-transform:uppercase;margin-bottom:5px}
#label .t2{font-size:8px;letter-spacing:.3em;color:rgba(140,200,255,.1);text-transform:uppercase}

#settings{position:fixed;bottom:28px;right:28px;z-index:50;font-family:var(--font)}
#stoggle{
  display:flex;align-items:center;gap:8px;
  background:none;border:1px solid rgba(140,200,255,.12);
  color:rgba(160,215,250,.5);cursor:pointer;
  font:8px/1 var(--font);letter-spacing:.3em;text-transform:uppercase;
  padding:7px 14px;transition:all .2s;
}
#stoggle:hover{border-color:rgba(140,200,255,.28);color:rgba(180,220,255,.85)}
#stoggle .dot{width:4px;height:4px;border-radius:50%;background:rgba(140,200,255,.4)}

#spanel{
  display:none;
  position:absolute;bottom:calc(100% + 8px);right:0;
  background:rgba(4,6,16,.94);border:1px solid rgba(140,200,255,.1);
  padding:18px 20px;min-width:228px;
}
#spanel.open{display:block}

.srow{margin-bottom:15px}
.srow:last-child{margin-bottom:0}
.slabel{
  display:block;margin-bottom:6px;
  font-size:7px;letter-spacing:.35em;text-transform:uppercase;
  color:rgba(140,200,255,.3);
}
.sinput,.sselect{
  width:100%;background:rgba(140,200,255,.04);
  border:1px solid rgba(140,200,255,.1);
  color:rgba(180,225,252,.72);
  font:10px var(--font);padding:5px 9px;
  outline:none;transition:border-color .2s;
}
.sinput:focus,.sselect:focus{border-color:rgba(140,200,255,.22)}
.sselect{appearance:none;cursor:pointer}
.fbtn{
  display:block;width:100%;
  background:rgba(140,200,255,.04);
  border:1px solid rgba(140,200,255,.1);
  color:rgba(180,225,252,.45);
  font:8px var(--font);letter-spacing:.2em;text-transform:uppercase;
  padding:7px 10px;cursor:pointer;text-align:center;transition:all .2s;
}
.fbtn:hover{border-color:rgba(140,200,255,.22);color:rgba(180,220,255,.8)}
#bgfile{display:none}

/* Arctic theme overrides */
body.arctic{background:var(--arctic)}
body.arctic #label .t1{color:rgba(40,90,160,.25)}
body.arctic #label .t2{color:rgba(40,90,160,.12)}
body.arctic #stoggle{border-color:rgba(40,90,160,.18);color:rgba(40,90,160,.5)}
body.arctic #spanel{background:rgba(238,243,248,.96);border-color:rgba(40,90,160,.12)}
body.arctic .slabel{color:rgba(40,90,160,.4)}
body.arctic .sinput,.arctic .sselect,.arctic .fbtn{
  background:rgba(40,90,160,.04);border-color:rgba(40,90,160,.12);
  color:rgba(30,80,150,.75);
}
body.arctic #cursor{background:rgba(60,120,200,.8);box-shadow:0 0 6px rgba(60,120,200,.8),0 0 18px rgba(60,120,200,.3)}
</style>
</head>
<body>

<canvas id="c"></canvas>
<div id="cursor"></div>

<div id="label">
  <div class="t1">Medusa · 水母</div>
  <div class="t2">Move to disturb</div>
</div>

<div id="settings">
  <div id="spanel">
    <div class="srow">
      <span class="slabel">Character Set</span>
      <input class="sinput" id="charset" type="text" value="0123456789ABCDEFabcdef·∘○◦⊹※" maxlength="80">
    </div>
    <div class="srow">
      <span class="slabel">Theme</span>
      <select class="sselect" id="themesel">
        <option value="ocean">Deep Ocean</option>
        <option value="void">Absolute Void</option>
        <option value="arctic">Arctic</option>
      </select>
    </div>
    <div class="srow">
      <span class="slabel">Background Image</span>
      <label class="fbtn" for="bgfile">Upload Image</label>
      <input type="file" id="bgfile" accept="image/*">
    </div>
  </div>
  <button id="stoggle"><span class="dot"></span>Settings</button>
</div>

<script>
// ─────────────────────────────────────────────────────────
// Canvas & sizing
// ─────────────────────────────────────────────────────────
const C = document.getElementById('c');
const ctx = C.getContext('2d');
const cursorEl = document.getElementById('cursor');
let W, H;

function resize() {
  W = C.width = window.innerWidth;
  H = C.height = window.innerHeight;
}
resize();
window.addEventListener('resize', () => { resize(); jelly.reanchor(W/2, H*0.17); });

// ─────────────────────────────────────────────────────────
// Themes
// ─────────────────────────────────────────────────────────
const THEMES = {
  ocean: {
    bg:'#040610', bgOverlay:'rgba(4,6,16,0.82)',
    bell:'rgba(100,168,218,', rim:'rgba(160,215,248,',
    tent:'rgba(200,230,250,', nema:'rgba(220,215,70,',
    rib:'rgba(170,215,250,', glow:'rgba(140,200,255,',
    particle:'rgba(155,220,255,',
    isDark:true
  },
  void: {
    bg:'#000000', bgOverlay:'rgba(0,0,0,0.82)',
    bell:'rgba(165,165,175,', rim:'rgba(220,220,230,',
    tent:'rgba(200,200,212,', nema:'rgba(240,240,170,',
    rib:'rgba(200,200,218,', glow:'rgba(210,210,255,',
    particle:'rgba(220,220,255,',
    isDark:true
  },
  arctic: {
    bg:'#eef3f8', bgOverlay:'rgba(238,243,248,0.78)',
    bell:'rgba(65,115,190,', rim:'rgba(90,145,220,',
    tent:'rgba(40,88,172,', nema:'rgba(200,150,20,',
    rib:'rgba(75,130,205,', glow:'rgba(60,120,200,',
    particle:'rgba(60,120,200,',
    isDark:false
  },
};
let T = THEMES.ocean;
let bgImg = null;

// ─────────────────────────────────────────────────────────
// Character set
// ─────────────────────────────────────────────────────────
let chars = '0123456789ABCDEFabcdef·∘○◦⊹※'.split('');
const rc = () => chars[Math.floor(Math.random()*chars.length)];

// ─────────────────────────────────────────────────────────
// Verlet node
// ─────────────────────────────────────────────────────────
class VN {
  constructor(x,y,pinned=false){
    this.x=x; this.y=y; this.ox=x; this.oy=y;
    this.ax=0; this.ay=0; this.pinned=pinned;
  }
  step(){
    if(this.pinned) return;
    const vx=(this.x-this.ox)*.986, vy=(this.y-this.oy)*.986;
    this.ox=this.x; this.oy=this.y;
    this.x+=vx+this.ax*.5;
    this.y+=vy+this.ay*.5;
    this.ax=0; this.ay=0.13;
  }
  push(fx,fy){this.ax+=fx; this.ay+=fy;}
}

// ─────────────────────────────────────────────────────────
// Tentacle
// ─────────────────────────────────────────────────────────
class Tentacle {
  constructor(ox, oy, segs, segLen, nemaRate){
    this.segLen = segLen;
    this.nemaRate = nemaRate; // 0-1, how often to show yellow dots
    this.chs = Array.from({length:segs+1}, rc);
    this.nodes = [];
    for(let i=0; i<=segs; i++){
      const n = new VN(ox+(Math.random()-.5)*2, oy+i*segLen, i===0);
      this.nodes.push(n);
    }
  }

  setAnchor(x,y){ this.nodes[0].x=x; this.nodes[0].y=y; }

  mousePush(mx,my,r,str){
    for(let i=1;i<this.nodes.length;i++){
      const n=this.nodes[i];
      const dx=n.x-mx, dy=n.y-my;
      const d2=dx*dx+dy*dy;
      if(d2<r*r && d2>0.01){
        const d=Math.sqrt(d2);
        const f=(1-d/r)*str*(1+i/this.nodes.length*.6);
        n.push(dx/d*f, dy/d*f*.75);
      }
    }
  }

  flow(t, str){
    const a=Math.sin(t*.38)*str, b=Math.cos(t*.27)*str*.4;
    for(let i=1;i<this.nodes.length;i++){
      const tt=i/this.nodes.length;
      this.nodes[i].push(
        a*tt + Math.sin(t*.65+i*.22)*str*.28,
        b*tt*.18
      );
    }
  }

  constrain(){
    for(let iter=0;iter<7;iter++){
      for(let i=0;i<this.nodes.length-1;i++){
        const a=this.nodes[i], b=this.nodes[i+1];
        const dx=b.x-a.x, dy=b.y-a.y;
        const d=Math.sqrt(dx*dx+dy*dy)||.001;
        const c=(d-this.segLen)/d*.5;
        if(!a.pinned){a.x+=dx*c; a.y+=dy*c;}
        if(!b.pinned){b.x-=dx*c; b.y-=dy*c;}
      }
    }
  }

  update(){ this.nodes.forEach(n=>n.step()); this.constrain(); }

  draw(){
    const len=this.nodes.length;
    for(let i=0;i<len;i++){
      const nd=this.nodes[i];
      const t=i/(len-1);
      const fade=(1-t*.55)*(i<2?i*.5:1);
      if(fade<.01) continue;

      const isNema = this.nemaRate>0 && i>0 && (i%5===0) && Math.random()<this.nemaRate;

      if(isNema){
        const g=ctx.createRadialGradient(nd.x,nd.y,0,nd.x,nd.y,5);
        g.addColorStop(0,T.nema+(fade*.9)+')');
        g.addColorStop(1,T.nema+'0)');
        ctx.beginPath(); ctx.arc(nd.x,nd.y,5,0,Math.PI*2);
        ctx.fillStyle=g; ctx.fill();
        ctx.beginPath(); ctx.arc(nd.x,nd.y,1.5,0,Math.PI*2);
        ctx.fillStyle=T.nema+(fade*.8)+')'; ctx.fill();
      } else {
        const vx=nd.x-nd.ox, vy=nd.y-nd.oy;
        const angle=Math.atan2(vy,vx)+Math.PI/2;
        const sz=7.5+(1-t)*2.5;
        ctx.save();
        ctx.translate(nd.x,nd.y);
        ctx.rotate(angle);
        ctx.font=sz+'px Courier New,monospace';
        ctx.fillStyle=T.tent+(fade*.82)+')';
        ctx.textAlign='center';
        ctx.textBaseline='middle';
        ctx.fillText(this.chs[i],0,0);
        ctx.restore();
      }
    }
  }

  refreshChars(){ this.chs=this.chs.map(rc); }
}

// ─────────────────────────────────────────────────────────
// Jellyfish
// ─────────────────────────────────────────────────────────
class Jellyfish {
  constructor(cx, cy){
    this.cx=cx; this.cy=cy; this.baseY=cy;
    this.vy=0; this.tick=0; this.pulse=0;
    this.bw=155; this.bh=92;
    this.tents=[];
    this._dots=this._seedDots();
    this._build();
  }

  _seedDots(){
    return Array.from({length:14},()=>({
      rx:(Math.random()-.5)*.82,
      ry:Math.random()*.88,
      r:Math.random()*1.8+.7,
      ph:Math.random()*Math.PI*2
    }));
  }

  _build(){
    this.tents=[];
    const N=26;
    for(let i=0;i<N;i++){
      const t=i/(N-1);
      const xOff=(t-.5)*this.bw*1.12;
      const edge=1-Math.abs(t-.5)*1.5;
      const segs=Math.max(7, Math.floor(10+edge*16+Math.random()*5));
      const sl=10+Math.random()*5;
      const isNema=Math.random()<.55;
      const ancY=this.cy+this.bh*.74+Math.abs(xOff)*.05;
      const tent=new Tentacle(this.cx+xOff, ancY, segs, sl, isNema?.4:0);
      this.tents.push({t:tent, xOff, ancDY:ancY-this.cy});
    }
  }

  reanchor(cx,cy){ this.cx=cx; this.cy=cy; this.baseY=cy; this._build(); }

  rebuildChars(){ this.tents.forEach(({t})=>t.refreshChars()); }

  update(mouse){
    this.tick++;
    this.pulse+=.017;
    // Rise on fast mouse
    const spd=Math.sqrt(mouse.vx*mouse.vx+mouse.vy*mouse.vy);
    if(spd>5) this.vy-=spd*.0028;
    // Spring return
    this.vy+=(this.baseY-this.cy)*.0011;
    this.vy*=.962;
    this.cy+=this.vy;

    this.tents.forEach(({t,xOff,ancDY})=>{
      t.setAnchor(this.cx+xOff, this.cy+ancDY);
      t.mousePush(mouse.x,mouse.y,115,.78);
      t.flow(this.tick,.048);
      t.update();
    });
  }

  drawBell(){
    const p=Math.sin(this.pulse);
    const bw=this.bw*(1+p*.038);
    const bh=this.bh*(1-p*.022);
    const cx=this.cx, cy=this.cy;

    ctx.save();
    ctx.translate(cx,cy);

    // Ambient outer glow
    const og=ctx.createRadialGradient(0,bh*.28,0,0,bh*.3,bw*.92);
    og.addColorStop(0,T.glow+'0)');
    og.addColorStop(.55,T.bell+'0.05)');
    og.addColorStop(1,T.bell+'0)');
    ctx.beginPath();
    ctx.ellipse(0,bh*.28,bw*.9,bh*.78,0,0,Math.PI*2);
    ctx.fillStyle=og; ctx.fill();

    // Bell body path
    ctx.beginPath();
    ctx.moveTo(0,0);
    ctx.bezierCurveTo(bw*.72,0, bw*.58,bh*.82, bw*.5,bh);
    ctx.bezierCurveTo(bw*.34,bh*1.09, 0,bh*.94, 0,bh*.94);
    ctx.bezierCurveTo(0,bh*.94, -bw*.34,bh*1.09, -bw*.5,bh);
    ctx.bezierCurveTo(-bw*.58,bh*.82, -bw*.72,0, 0,0);

    // Gradient fill
    const bg=ctx.createRadialGradient(0,bh*.22,0,0,bh*.38,bw*.7);
    bg.addColorStop(0,T.bell+'0.24)');
    bg.addColorStop(.62,T.bell+'0.11)');
    bg.addColorStop(1,T.bell+'0.03)');
    ctx.fillStyle=bg; ctx.fill();

    // Rim
    ctx.beginPath();
    ctx.moveTo(-bw*.5,bh);
    ctx.bezierCurveTo(-bw*.34,bh*1.09, 0,bh*.94, 0,bh*.94);
    ctx.bezierCurveTo(0,bh*.94, bw*.34,bh*1.09, bw*.5,bh);
    ctx.strokeStyle=T.rim+'0.38)'; ctx.lineWidth=1.3; ctx.stroke();

    // Radial ribs
    for(let i=-4;i<=4;i++){
      if(i===0) continue;
      const xb=i*bw*.115, xt=i*bw*.085;
      ctx.beginPath();
      ctx.moveTo(xb,bh*.06);
      ctx.bezierCurveTo(xb+i*3,bh*.44, xb+i*5,bh*.76, xt+i*2,bh*.92);
      ctx.strokeStyle=T.rib+`${.04+Math.abs(i)*.005})`; ctx.lineWidth=.55; ctx.stroke();
    }

    // Top specular highlight
    const sg=ctx.createRadialGradient(0,bh*.16,0,0,bh*.2,bw*.44);
    sg.addColorStop(0,T.rim+'0.18)');
    sg.addColorStop(.55,T.rim+'0.05)');
    sg.addColorStop(1,'rgba(0,0,0,0)');
    ctx.beginPath();
    ctx.ellipse(0,bh*.2,bw*.44,bh*.32,0,0,Math.PI*2);
    ctx.fillStyle=sg; ctx.fill();

    // Internal manubrium glow
    const ig=ctx.createRadialGradient(0,bh*.56,0,0,bh*.56,bw*.22);
    ig.addColorStop(0,T.nema+`${.1+Math.sin(this.pulse*1.4)*.055})`);
    ig.addColorStop(1,'rgba(0,0,0,0)');
    ctx.beginPath();
    ctx.ellipse(0,bh*.56,bw*.22,bh*.3,0,0,Math.PI*2);
    ctx.fillStyle=ig; ctx.fill();

    // Bioluminescent texture dots
    this._dots.forEach(d=>{
      const px=d.rx*bw, py=d.ry*bh;
      const lum=(Math.sin(this.pulse+d.ph)*.5+.5);
      const r=d.r;
      const dg=ctx.createRadialGradient(px,py,0,px,py,r*3.5);
      dg.addColorStop(0,T.nema+`${.15+lum*.1})`);
      dg.addColorStop(1,'rgba(0,0,0,0)');
      ctx.beginPath(); ctx.arc(px,py,r*3.5,0,Math.PI*2);
      ctx.fillStyle=dg; ctx.fill();
      ctx.beginPath(); ctx.arc(px,py,r*.55,0,Math.PI*2);
      ctx.fillStyle=T.nema+`${.22+lum*.08})`; ctx.fill();
    });

    ctx.restore();
  }

  draw(){
    this.tents.forEach(({t})=>t.draw());
    this.drawBell();
  }
}

// ─────────────────────────────────────────────────────────
// Cursor particles
// ─────────────────────────────────────────────────────────
class Particle {
  constructor(x,y){
    this.x=x; this.y=y;
    this.vx=(Math.random()-.5)*1.4;
    this.vy=(Math.random()-.8)*2.2;
    this.r=Math.random()*2+.8;
    this.life=1;
    this.decay=.016+Math.random()*.018;
  }
  update(){
    this.x+=this.vx; this.y+=this.vy;
    this.vy+=.038; this.vx*=.975;
    this.life-=this.decay;
  }
  draw(){
    if(this.life<=0) return;
    const g=ctx.createRadialGradient(this.x,this.y,0,this.x,this.y,this.r*4.5);
    g.addColorStop(0,T.particle+(this.life*.65)+')');
    g.addColorStop(1,T.particle+'0)');
    ctx.beginPath(); ctx.arc(this.x,this.y,this.r*4.5,0,Math.PI*2);
    ctx.fillStyle=g; ctx.fill();
    ctx.beginPath(); ctx.arc(this.x,this.y,this.r*.55,0,Math.PI*2);
    ctx.fillStyle=T.particle+this.life+')'; ctx.fill();
  }
}

// ─────────────────────────────────────────────────────────
// Mouse / Touch
// ─────────────────────────────────────────────────────────
const mouse={x:-9999,y:-9999,vx:0,vy:0};
let particles=[];
let frame=0;

function onMove(cx,cy){
  mouse.vx=cx-mouse.x; mouse.vy=cy-mouse.y;
  mouse.x=cx; mouse.y=cy;
  cursorEl.style.left=cx+'px';
  cursorEl.style.top=cy+'px';
  if(frame%2===0) particles.push(new Particle(cx,cy));
}

window.addEventListener('mousemove',e=>onMove(e.clientX,e.clientY));
window.addEventListener('touchmove',e=>{
  e.preventDefault();
  const t=e.touches[0];
  onMove(t.clientX,t.clientY);
},{passive:false});

// ─────────────────────────────────────────────────────────
// Settings wiring
// ─────────────────────────────────────────────────────────
const stoggle=document.getElementById('stoggle');
const spanel=document.getElementById('spanel');
stoggle.addEventListener('click',()=>spanel.classList.toggle('open'));

document.getElementById('charset').addEventListener('input',e=>{
  const v=e.target.value.trim();
  if(v.length>0){ chars=v.split(''); jelly.rebuildChars(); }
});

document.getElementById('themesel').addEventListener('change',e=>{
  const key=e.target.value;
  if(key!=='custom'){
    T=THEMES[key];
    bgImg=null;
    document.body.className=key==='arctic'?'arctic':'';
  }
});

document.getElementById('bgfile').addEventListener('change',e=>{
  const f=e.target.files[0];
  if(!f) return;
  const rd=new FileReader();
  rd.onload=ev=>{
    const img=new Image();
    img.onload=()=>bgImg=img;
    img.src=ev.target.result;
  };
  rd.readAsDataURL(f);
});

// ─────────────────────────────────────────────────────────
// Main loop
// ─────────────────────────────────────────────────────────
const jelly=new Jellyfish(W/2, H*.17);

(function loop(){
  frame++;

  if(bgImg){
    // Cover fill
    const iR=bgImg.width/bgImg.height, cR=W/H;
    let dw,dh,dx,dy;
    if(iR>cR){dh=H;dw=H*iR;dx=(W-dw)/2;dy=0;}
    else{dw=W;dh=W/iR;dx=0;dy=(H-dh)/2;}
    ctx.drawImage(bgImg,dx,dy,dw,dh);
    ctx.fillStyle=T.bgOverlay||'rgba(4,6,16,0.78)';
    ctx.fillRect(0,0,W,H);
  } else {
    ctx.fillStyle=T.bg;
    ctx.fillRect(0,0,W,H);
  }

  mouse.vx*=.82; mouse.vy*=.82;

  particles=particles.filter(p=>p.life>0);
  particles.forEach(p=>{p.update();p.draw();});

  jelly.update(mouse);
  jelly.draw();

  requestAnimationFrame(loop);
})();
</script>
</body>
</html>
